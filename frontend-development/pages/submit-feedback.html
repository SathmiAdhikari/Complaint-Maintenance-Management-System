<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback — CMMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:#f8f9fb; }
        .sidebar { position:fixed; top:0; left:0; width:260px; height:100vh; background:linear-gradient(180deg,#112D4E 0%,#1a4a7a 100%); color:white; display:flex; flex-direction:column; z-index:100; }
        .sidebar-brand { padding:25px 20px; border-bottom:1px solid rgba(255,255,255,0.1); }
        .sidebar-brand h2 { font-size:22px; font-weight:700; }
        .sidebar-brand h2 span { color:#be1744; }
        .sidebar-brand p { font-size:11px; color:rgba(255,255,255,0.6); margin-top:3px; }
        .sidebar-user { padding:20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:12px; }
        .user-avatar { width:42px; height:42px; background:#be1744; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
        .user-info h4 { font-size:13px; font-weight:600; }
        .user-info p { font-size:11px; color:rgba(255,255,255,0.6); }
        .sidebar-nav { flex:1; padding:20px 0; }
        .nav-label { font-size:10px; letter-spacing:1.5px; color:rgba(255,255,255,0.4); padding:0 20px; margin-bottom:8px; margin-top:15px; text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; color:rgba(255,255,255,0.75); text-decoration:none; font-size:14px; transition:0.3s; }
        .nav-item:hover, .nav-item.active { background:rgba(190,23,68,0.2); color:white; border-left:3px solid #be1744; }
        .nav-item i { width:20px; text-align:center; font-size:16px; }
        .sidebar-footer { padding:20px; border-top:1px solid rgba(255,255,255,0.1); }
        .logout-btn { display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.75); cursor:pointer; font-size:14px; background:none; border:none; font-family:'Poppins',sans-serif; transition:0.3s; width:100%; }
        .logout-btn:hover { color:#be1744; }
        .main-content { margin-left:260px; min-height:100vh; }
        .topbar { background:white; padding:18px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .topbar h1 { font-size:20px; color:#112D4E; font-weight:600; }
        .topbar p { font-size:13px; color:#777; }
        .back-btn { display:flex; align-items:center; gap:8px; color:#112D4E; text-decoration:none; font-size:13px; font-weight:500; padding:8px 16px; background:#f0f2f5; border-radius:7px; transition:0.3s; }
        .back-btn:hover { background:#112D4E; color:white; }
        .page-body { padding:30px; display:flex; justify-content:center; }
        .feedback-box { background:white; border-radius:15px; padding:35px; box-shadow:0 2px 8px rgba(0,0,0,0.06); width:100%; max-width:560px; }
        .feedback-box h3 { font-size:18px; color:#112D4E; font-weight:700; margin-bottom:5px; }
        .feedback-box p { font-size:13px; color:#777; margin-bottom:25px; }

        .worker-info { display:flex; align-items:center; gap:15px; padding:18px; background:#f8f9fb; border-radius:12px; margin-bottom:25px; }
        .worker-av { width:55px; height:55px; background:linear-gradient(135deg,#112D4E,#be1744); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:20px; }
        .worker-det h4 { font-size:15px; color:#112D4E; font-weight:600; }
        .worker-det p { font-size:12px; color:#777; }

        /* Star Rating */
        .star-rating { display:flex; flex-direction:row-reverse; justify-content:center; gap:8px; margin-bottom:10px; }
        .star-rating input { display:none; }
        .star-rating label { font-size:42px; color:#ddd; cursor:pointer; transition:0.2s; }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label { color:#E8A838; }

        .rating-text { text-align:center; font-size:13px; color:#777; margin-bottom:25px; font-weight:500; }

        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:12px; font-weight:600; color:#112D4E; margin-bottom:6px; }
        .form-group textarea { width:100%; padding:12px; border:1.5px solid #e0e0e0; border-radius:8px; font-family:'Poppins',sans-serif; font-size:13px; outline:none; resize:none; height:110px; transition:0.3s; }
        .form-group textarea:focus { border-color:#112D4E; }

        .submit-btn { width:100%; padding:13px; background:#be1744; color:white; border:none; border-radius:8px; font-family:'Poppins',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:0.3s; }
        .submit-btn:hover { background:#a01238; transform:translateY(-2px); }

        .alert { padding:12px 15px; border-radius:8px; font-size:13px; margin-bottom:15px; display:none; }
        .alert-success { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; }
        .alert-error   { background:#ffebee; color:#c62828; border:1px solid #ffcdd2; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h2>CM<span>MS</span></h2>
        <p>Complaint & Maintenance System</p>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" id="avatarLetter">R</div>
        <div class="user-info">
            <h4 id="userName">Resident</h4>
            <p>Resident</p>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a class="nav-item" href="resident-dashboard.html">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a class="nav-item" href="submit-complaint.html">
            <i class="fas fa-plus-circle"></i> Submit Complaint
        </a>
        <a class="nav-item active" href="my-complaints.html">
            <i class="fas fa-clipboard-list"></i> My Complaints
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>

<div class="main-content">
    <div class="topbar">
        <div>
            <h1>Submit Feedback</h1>
            <p>Rate the worker's performance</p>
        </div>
        <a href="my-complaints.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="page-body">
        <div class="feedback-box">
            <h3>Rate Your Experience</h3>
            <p>How satisfied are you with the maintenance work?</p>

            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <!-- Worker Info -->
            <div class="worker-info" id="workerInfo">
                <div class="worker-av" id="workerAvatar">W</div>
                <div class="worker-det">
                    <h4 id="workerName">Loading worker...</h4>
                    <p id="workerTrade">Worker</p>
                </div>
            </div>

            <!-- Star Rating -->
            <div style="text-align:center;margin-bottom:8px;">
                <label style="font-size:12px;font-weight:600;color:#112D4E;">
                    YOUR RATING
                </label>
            </div>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5">
                <label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1">
                <label for="star1">★</label>
            </div>
            <div class="rating-text" id="ratingText">Click a star to rate</div>

            <div class="form-group">
                <label>Your Comment (Optional)</label>
                <textarea id="comment"
                    placeholder="Share your experience with this worker..."></textarea>
            </div>

            <button class="submit-btn" onclick="handleSubmit()">
                <i class="fas fa-paper-plane"></i> Submit Feedback
            </button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    const user = checkRole('RESIDENT');
    document.getElementById('userName').textContent = user.fullName;
    document.getElementById('avatarLetter').textContent =
        user.fullName.charAt(0).toUpperCase();

    const params = new URLSearchParams(window.location.search);
    const complaintId = params.get('id');

    const ratingLabels = {
        1: 'Poor — Very dissatisfied',
        2: 'Fair — Somewhat dissatisfied',
        3: 'Good — Satisfied',
        4: 'Very Good — Very satisfied',
        5: 'Excellent — Extremely satisfied'
    };

    let complaint = null;

    // Star rating text update
    document.querySelectorAll('.star-rating input').forEach(input => {
        input.addEventListener('change', function() {
            document.getElementById('ratingText').textContent =
                ratingLabels[this.value];
        });
    });

    async function loadComplaint() {
        if (!complaintId) {
            window.location.href = 'my-complaints.html';
            return;
        }
        try {
            complaint = await getComplaint(complaintId);
            if (complaint.assignedTo) {
                document.getElementById('workerName').textContent =
                    complaint.assignedTo.fullName;
                document.getElementById('workerAvatar').textContent =
                    complaint.assignedTo.fullName.charAt(0);
                document.getElementById('workerTrade').textContent =
                    complaint.assignedTo.phoneNumber || 'Worker';
            }
        } catch (err) {
            showError('Error loading complaint details.');
        }
    }

    async function handleSubmit() {
        const ratingInput = document.querySelector(
            '.star-rating input:checked');
        if (!ratingInput) {
            showError('Please select a star rating.');
            return;
        }

        const rating = parseInt(ratingInput.value);
        const comment = document.getElementById('comment').value.trim();

        const btn = document.querySelector('.submit-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
        btn.disabled = true;

        const result = await submitFeedback({
            complaintId: String(complaintId),
            residentId: String(user.userId),
            rating: String(rating),
            comment
        });

        if (result.error) {
            showError(result.error);
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Feedback';
            btn.disabled = false;
            return;
        }

        showSuccess('Feedback submitted successfully! Thank you.');
        setTimeout(() => {
            window.location.href = 'my-complaints.html';
        }, 2000);
    }

    function showError(msg) {
        const el = document.getElementById('errorAlert');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('successAlert').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successAlert');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('errorAlert').style.display = 'none';
    }

    loadComplaint();
</script>

</body>
</html>
