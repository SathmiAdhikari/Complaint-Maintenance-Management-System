<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail — CMMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:#f8f9fb; }
        .sidebar { position:fixed; top:0; left:0; width:260px; height:100vh; background:linear-gradient(180deg,#112D4E 0%,#1a4a7a 100%); color:white; display:flex; flex-direction:column; z-index:100; }
        .sidebar-brand { padding:25px 20px; border-bottom:1px solid rgba(255,255,255,0.1); }
        .sidebar-brand h2 { font-size:22px; font-weight:700; }
        .sidebar-brand h2 span { color:#be1744; }
        .sidebar-brand p { font-size:11px; color:rgba(255,255,255,0.6); margin-top:3px; }
        .sidebar-user { padding:20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:12px; }
        .user-avatar { width:42px; height:42px; background:#be1744; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; }
        .user-info h4 { font-size:13px; font-weight:600; }
        .user-info p { font-size:11px; color:rgba(255,255,255,0.6); }
        .sidebar-nav { flex:1; padding:20px 0; }
        .nav-label { font-size:10px; letter-spacing:1.5px; color:rgba(255,255,255,0.4); padding:0 20px; margin-bottom:8px; margin-top:15px; text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; color:rgba(255,255,255,0.75); text-decoration:none; font-size:14px; transition:0.3s; }
        .nav-item:hover, .nav-item.active { background:rgba(190,23,68,0.2); color:white; border-left:3px solid #be1744; }
        .nav-item i { width:20px; text-align:center; font-size:16px; }
        .sidebar-footer { padding:20px; border-top:1px solid rgba(255,255,255,0.1); }
        .logout-btn { display:flex; align-items:center; gap:10px; color:rgba(255,255,255,0.75); cursor:pointer; font-size:14px; background:none; border:none; font-family:'Poppins',sans-serif; transition:0.3s; width:100%; }
        .logout-btn:hover { color:#be1744; }
        .main-content { margin-left:260px; min-height:100vh; }
        .topbar { background:white; padding:18px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .topbar h1 { font-size:20px; color:#112D4E; font-weight:600; }
        .topbar p { font-size:13px; color:#777; }
        .back-btn { display:flex; align-items:center; gap:8px; color:#112D4E; text-decoration:none; font-size:13px; font-weight:500; padding:8px 16px; background:#f0f2f5; border-radius:7px; transition:0.3s; }
        .back-btn:hover { background:#112D4E; color:white; }
        .page-body { padding:30px; }
        .content-grid { display:grid; grid-template-columns:1.5fr 1fr; gap:20px; }
        .card { background:white; border-radius:12px; padding:25px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:20px; }
        .card h3 { font-size:16px; color:#112D4E; font-weight:600; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-bottom:1px solid #f5f5f5; }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { font-size:12px; color:#999; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; width:35%; }
        .detail-value { font-size:13px; color:#333; font-weight:500; text-align:right; width:63%; }
        .badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .badge-assigned    { background:#fff3e0; color:#e65100; }
        .badge-in_progress { background:#f3e5f5; color:#6a1b9a; }
        .badge-completed   { background:#e8f5e9; color:#2e7d32; }
        .badge-closed      { background:#eceff1; color:#546e7a; }
        .badge-low    { background:#e8f5e9; color:#2e7d32; }
        .badge-medium { background:#fff3e0; color:#e65100; }
        .badge-high   { background:#ffebee; color:#be1744; }
        .badge-urgent { background:#be1744; color:white; }

        /* Status Update */
        .status-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .status-btn { padding:15px; border:1.5px solid #e0e0e0; border-radius:10px; background:white; cursor:pointer; font-family:'Poppins',sans-serif; font-size:13px; font-weight:500; transition:0.3s; text-align:center; }
        .status-btn:hover { border-color:#be1744; background:#fff5f7; }
        .status-btn.selected { border-color:#be1744; background:#fff5f7; color:#be1744; }
        .status-btn i { display:block; font-size:22px; margin-bottom:6px; }
        .status-btn.in-progress i { color:#6a1b9a; }
        .status-btn.completed i  { color:#2e7d32; }

        .remarks-group { margin-top:15px; margin-bottom:15px; }
        .remarks-group label { display:block; font-size:12px; font-weight:600; color:#112D4E; margin-bottom:6px; }
        .remarks-group textarea { width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:7px; font-family:'Poppins',sans-serif; font-size:13px; outline:none; resize:none; height:80px; transition:0.3s; }
        .remarks-group textarea:focus { border-color:#112D4E; }

        .update-btn { width:100%; padding:13px; background:#be1744; color:white; border:none; border-radius:8px; font-family:'Poppins',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:0.3s; }
        .update-btn:hover { background:#a01238; transform:translateY(-2px); }
        .update-btn:disabled { background:#ccc; cursor:not-allowed; transform:none; }

        .alert { padding:12px 15px; border-radius:8px; font-size:13px; margin-bottom:15px; display:none; }
        .alert-success { background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; }
        .alert-error   { background:#ffebee; color:#c62828; border:1px solid #ffcdd2; }

        /* Timeline */
        .timeline-item { display:flex; gap:15px; margin-bottom:20px; }
        .timeline-dot { width:12px; height:12px; background:#be1744; border-radius:50%; margin-top:4px; flex-shrink:0; position:relative; }
        .timeline-dot::after { content:''; position:absolute; top:12px; left:5px; width:2px; height:calc(100% + 15px); background:#e0e0e0; }
        .timeline-item:last-child .timeline-dot::after { display:none; }
        .timeline-content h4 { font-size:13px; color:#112D4E; font-weight:600; }
        .timeline-content p { font-size:12px; color:#777; margin-top:2px; }

        .completed-notice { background:#e8f5e9; border-radius:10px; padding:20px; text-align:center; color:#2e7d32; }
        .completed-notice i { font-size:35px; margin-bottom:10px; display:block; }
        .completed-notice h4 { font-size:15px; font-weight:600; margin-bottom:5px; }
        .completed-notice p { font-size:13px; color:#555; }

        .empty-state { text-align:center; padding:30px; color:#999; }
        .empty-state i { font-size:35px; margin-bottom:10px; display:block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h2>CM<span>MS</span></h2>
        <p>Complaint & Maintenance System</p>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" id="avatarLetter">W</div>
        <div class="user-info">
            <h4 id="userName">Worker</h4>
            <p>Maintenance Worker</p>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a class="nav-item" href="worker-dashboard.html">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a class="nav-item active" href="assigned-jobs.html">
            <i class="fas fa-clipboard-list"></i> Assigned Jobs
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>

<div class="main-content">
    <div class="topbar">
        <div>
            <h1>Job Detail</h1>
            <p>View job details and update status</p>
        </div>
        <a href="assigned-jobs.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Jobs
        </a>
    </div>

    <div class="page-body">
        <div class="content-grid">

            <!-- Job Details -->
            <div>
                <div class="card">
                    <h3><i class="fas fa-clipboard"></i> Job Details</h3>
                    <div id="jobDetails">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="card">
                    <h3><i class="fas fa-history"></i> Progress Timeline</h3>
                    <div id="jobTimeline">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Update Status -->
            <div class="card">
                <h3><i class="fas fa-edit"></i> Update Status</h3>

                <div class="alert alert-success" id="successAlert"></div>
                <div class="alert alert-error" id="errorAlert"></div>

                <div id="updateSection">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    const user = checkRole('WORKER');
    document.getElementById('userName').textContent = user.fullName;
    document.getElementById('avatarLetter').textContent =
        user.fullName.charAt(0).toUpperCase();

    const params = new URLSearchParams(window.location.search);
    const complaintId = params.get('id');
    let selectedStatus = '';

    async function loadJob() {
        if (!complaintId) {
            window.location.href = 'assigned-jobs.html';
            return;
        }

        try {
            const j = await getComplaint(complaintId);

            // Details
            document.getElementById('jobDetails').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">Job ID</span>
                    <span class="detail-value">#${j.complaintId}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Title</span>
                    <span class="detail-value">${j.title}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Description</span>
                    <span class="detail-value">${j.description}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Category</span>
                    <span class="detail-value">${j.category}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Priority</span>
                    <span class="detail-value">
                        <span class="badge badge-${j.priority.toLowerCase()}">
                            ${j.priority}
                        </span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value">
                        <span class="badge badge-${j.status.toLowerCase()
                            .replace('_','-')}">
                            ${j.status.replace('_',' ')}
                        </span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Location</span>
                    <span class="detail-value">${j.location || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Assigned</span>
                    <span class="detail-value">
                        ${new Date(j.updatedAt).toLocaleDateString()}
                    </span>
                </div>
            `;

            // Timeline
            document.getElementById('jobTimeline').innerHTML = `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <h4>Complaint Submitted</h4>
                        <p>${new Date(j.createdAt).toLocaleString()}</p>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <h4>Assigned to You</h4>
                        <p>${new Date(j.updatedAt).toLocaleString()}</p>
                    </div>
                </div>
                ${j.status === 'IN_PROGRESS' ||
                  j.status === 'COMPLETED' ? `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <h4>Work Started</h4>
                            <p>${new Date(j.updatedAt).toLocaleString()}</p>
                        </div>
                    </div>
                ` : ''}
                ${j.status === 'COMPLETED' ? `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <h4>Job Completed</h4>
                            <p>${j.resolvedAt ?
                                new Date(j.resolvedAt).toLocaleString() :
                                'Completed'}</p>
                        </div>
                    </div>
                ` : ''}
            `;

            // Update section
            const updateSection = document.getElementById('updateSection');

            if (j.status === 'COMPLETED' || j.status === 'CLOSED') {
                updateSection.innerHTML = `
                    <div class="completed-notice">
                        <i class="fas fa-check-circle"></i>
                        <h4>Job Completed!</h4>
                        <p>This job has been marked as completed.</p>
                    </div>`;
            } else {
                updateSection.innerHTML = `
                    <p style="font-size:13px;color:#777;margin-bottom:15px;">
                        Select the new status for this job:
                    </p>
                    <div class="status-btns">
                        <div class="status-btn in-progress"
                            id="btn-IN_PROGRESS"
                            onclick="selectStatus('IN_PROGRESS')">
                            <i class="fas fa-spinner"></i>
                            In Progress
                        </div>
                        <div class="status-btn completed"
                            id="btn-COMPLETED"
                            onclick="selectStatus('COMPLETED')">
                            <i class="fas fa-check-circle"></i>
                            Completed
                        </div>
                    </div>
                    <div class="remarks-group">
                        <label>Remarks (Optional)</label>
                        <textarea id="remarks"
                            placeholder="Add notes about the work done..."></textarea>
                    </div>
                    <button class="update-btn" id="updateBtn"
                        onclick="handleUpdate()" disabled>
                        <i class="fas fa-save"></i> Update Status
                    </button>
                `;

                // Pre-select current status
                if (j.status === 'IN_PROGRESS') {
                    selectStatus('IN_PROGRESS');
                }
            }

        } catch (err) {
            console.error(err);
        }
    }

    function selectStatus(status) {
        document.querySelectorAll('.status-btn')
            .forEach(btn => btn.classList.remove('selected'));
        const btn = document.getElementById(`btn-${status}`);
        if (btn) btn.classList.add('selected');
        selectedStatus = status;
        const updateBtn = document.getElementById('updateBtn');
        if (updateBtn) updateBtn.disabled = false;
    }

    async function handleUpdate() {
        if (!selectedStatus) return;

        const remarks = document.getElementById('remarks') ?
            document.getElementById('remarks').value.trim() : '';

        const btn = document.getElementById('updateBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        try {
            const result = await updateStatus(
                complaintId,
                selectedStatus,
                String(user.userId),
                remarks
            );

            if (result.error) {
                showError(result.error);
                btn.innerHTML = '<i class="fas fa-save"></i> Update Status';
                btn.disabled = false;
                return;
            }

            showSuccess('Status updated successfully!');
            setTimeout(() => {
                loadJob();
            }, 1500);

        } catch (err) {
            showError('Error updating status.');
            btn.innerHTML = '<i class="fas fa-save"></i> Update Status';
            btn.disabled = false;
        }
    }

    function showSuccess(msg) {
        const el = document.getElementById('successAlert');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('errorAlert').style.display = 'none';
    }

    function showError(msg) {
        const el = document.getElementById('errorAlert');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('successAlert').style.display = 'none';
    }

    loadJob();
</script>

</body>
</html>
